# canmap_MEgasquirt.conf generated from MegaSquirt_CAN_Broadcast
# Profile: MegaSquirt simplified dash broadcast
# MegaSquirt simplified dash broadcast uses 11-bit CAN IDs, 500 kbit/s,
# sequential IDs, big-endian byte order, default base ID 1512 decimal / 0x5E8.
# Copy this file to /canmap.conf on  SD card OR edit directly using M-Gauge Web Configuration  to use it.
# NOTE: This maps the simplified dash broadcast set only. The advanced real-time
# dataset is much larger than the current M-Gauge ECU_DATA_COUNT table.
# SPEED: define physical CAN-Bus speed. Supported: 1, 5, 10, 12.5, 16, 20, 25, 50, 100, 125, 250, 500, 800 KBITS and 1MBITS. DEFAULT 500KBITS
# FILTER: optional hardware CAN filter. mask bits are ID bits that must match; this accepts standard IDs 0x500-0x5FF.
# ROLE: define which signals are tied  to specific roles like RPM, MAP, error counts or  status messages. 
# SIGNAL: define the details of each CAN signal, including its ID, bit position, length, scaling, and name. 
# INTERNAL: optionally maps built-in board sensor channels to ECU data indexes. Supported source values: accelX, accelY, accelZ, gyroX, gyroY, gyroZ.
# Example: INTERNAL:25,source=accelX,factor=100,offset=0,scaling=100,min=-8,max=8,alarmLimitMin=-8,alarmLimit=8,alarmSource=0,name=G|Accel X
# VALUE and UNIT can override displayed value/unit text from raw signal conditions.
# Example: VALUE:57,raw=0,text=N
# Example: UNIT:57,raw=0,text=Neutral
# Custom error codes can be defined with the ERROR: directive
# ERROR:11,text=IAT sensor error
# ERROR:82,text=Custom ECU fault text
# ERROR:120,text=Another custom error|second line


SPEED:500KBITS
ROLE:rpmIndex=1
ROLE:mapIndex=0

